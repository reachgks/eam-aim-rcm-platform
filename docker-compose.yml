version: '3.9'

x-common-env: &common-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-eam_user}:${POSTGRES_PASSWORD:-eam_secret}@postgres:5432/${POSTGRES_DB:-eam_platform}
  REDIS_URL: redis://redis:6379
  NODE_ENV: ${NODE_ENV:-development}
  JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  # ─────────────────────────────────────────────
  # PostgreSQL 16 + TimescaleDB
  # ─────────────────────────────────────────────
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: eam-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eam_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eam_secret}
      POSTGRES_DB: ${POSTGRES_DB:-eam_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eam_user} -d ${POSTGRES_DB:-eam_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eam-network

  # ─────────────────────────────────────────────
  # Redis — Caching, Sessions, BullMQ
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eam-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eam-network

  # ─────────────────────────────────────────────
  # API Server (Fastify)
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: eam-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      <<: *common-env
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-mqtt://mosquitto:1883}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads
    networks:
      - eam-network

  # ─────────────────────────────────────────────
  # Background Worker (BullMQ)
  # ─────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: eam-worker
    restart: unless-stopped
    environment:
      <<: *common-env
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eam-network

  # ─────────────────────────────────────────────
  # Web Frontend (Next.js)
  # ─────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: eam-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    depends_on:
      - api
    networks:
      - eam-network

  # ─────────────────────────────────────────────
  # Telemetry Ingestion (MQTT + HTTP)
  # ─────────────────────────────────────────────
  telemetry-ingestion:
    build:
      context: .
      dockerfile: apps/telemetry-ingestion/Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: eam-telemetry
    restart: unless-stopped
    ports:
      - "${TELEMETRY_PORT:-3002}:3002"
    environment:
      <<: *common-env
      PORT: 3002
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-mqtt://mosquitto:1883}
      BATCH_SIZE: ${TELEMETRY_BATCH_SIZE:-1000}
      FLUSH_INTERVAL_MS: ${TELEMETRY_FLUSH_INTERVAL:-5000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eam-network

  # ─────────────────────────────────────────────
  # MQTT Broker (Mosquitto)
  # ─────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: eam-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - eam-network

  # ─────────────────────────────────────────────
  # pgAdmin (Dev Only)
  # ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: eam-pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@eam-platform.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev
    networks:
      - eam-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  upload_data:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_log:
    driver: local

networks:
  eam-network:
    driver: bridge
    name: eam-platform-network
